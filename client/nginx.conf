server {
    listen 80;
    
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        
        # Disable caching for HTML index to ensure clients always get new bundles
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # Use a variable to force DNS resolution at runtime
    resolver 127.0.0.11 valid=30s;
    set $backend http://api:8080;

    # Proxy API requests to the backend server
    location /api/ {
        proxy_pass $backend/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_buffering off;
        proxy_read_timeout 600s;
    }

    # Proxy uploads to the backend server
    location /uploads/ {
        proxy_pass $backend/uploads/;
    }
}
