name: Deploy on Tag

on:
  push:
    tags:
      - "*"

concurrency:
  group: >-
    deploy-${{
      contains(github.ref_name, '.reembed.prod') && 'reembed-prod' ||
      contains(github.ref_name, '.reembed.dev') && 'reembed-dev' ||
      contains(github.ref_name, '.prod') && 'prod' ||
      contains(github.ref_name, '.dev') && 'dev' ||
      'other'
    }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  API_IMAGE: shelfscan-api
  CLIENT_IMAGE: shelfscan-client
  ADMIN_CLIENT_IMAGE: shelfscan-admin-client
  MCP_IMAGE: shelfscan-mcp
  REEMBED_IMAGE: shelfscan-reembed

jobs:
  prepare:
    name: Resolve Tag Metadata
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.meta.outputs.tag_name }}
      environment: ${{ steps.meta.outputs.environment }}
      run_reembed: ${{ steps.meta.outputs.run_reembed }}
      api_changed: ${{ steps.changes.outputs.api }}
      mcp_changed: ${{ steps.changes.outputs.mcp }}
      client_changed: ${{ steps.changes.outputs.client }}
      admin_changed: ${{ steps.changes.outputs.admin }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need history + tags for diff vs previous tag

      - name: Extract tag and determine environment
        id: meta
        shell: bash
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

          if [[ "$TAG_NAME" == *".dev"* ]]; then
            echo "environment=dev" >> $GITHUB_OUTPUT
          elif [[ "$TAG_NAME" == *".prod"* ]]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
          else
            echo "Tag format not recognized. Use v*.dev or v*.prod"
            exit 1
          fi

          if [[ "$TAG_NAME" == *".reembed"* ]]; then
            echo "run_reembed=true" >> $GITHUB_OUTPUT
          else
            echo "run_reembed=false" >> $GITHUB_OUTPUT
          fi

      - name: Detect changed paths vs previous tag
        id: changes
        shell: bash
        run: |
          set -e
          # Compare against the previous tag on the same reachable history.
          # Fallback to "everything changed" if there is no previous tag or the
          # tag lives on a detached commit with no prior tag.
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [[ -z "$PREV_TAG" ]]; then
            echo "No previous tag found — building everything"
            for k in api mcp client admin; do
              echo "$k=true" >> $GITHUB_OUTPUT
            done
            exit 0
          fi
          echo "Diffing $PREV_TAG..HEAD"
          CHANGED=$(git diff --name-only "$PREV_TAG" HEAD)
          echo "$CHANGED"

          set_flag() {
            local key=$1 pattern=$2
            if echo "$CHANGED" | grep -qE "$pattern"; then
              echo "$key=true" >> $GITHUB_OUTPUT
            else
              echo "$key=false" >> $GITHUB_OUTPUT
            fi
          }

          set_flag api          '^server/'
          set_flag mcp          '^mcp/'
          set_flag client       '^client/'
          set_flag admin        '^admin-client/'

  build-api:
    name: Build API Image
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.api_changed == 'true'
    environment: ${{ needs.prepare.outputs.environment }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.API_IMAGE }}:${{ needs.prepare.outputs.tag_name }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.API_IMAGE }}:${{ needs.prepare.outputs.environment }}-latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-reembed:
    name: Build Reembed Image
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.run_reembed == 'true'
    environment: ${{ needs.prepare.outputs.environment }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Reembed image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile.reembed
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.REEMBED_IMAGE }}:${{ needs.prepare.outputs.tag_name }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.REEMBED_IMAGE }}:${{ needs.prepare.outputs.environment }}-latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-mcp:
    name: Build MCP Image
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.mcp_changed == 'true'
    environment: ${{ needs.prepare.outputs.environment }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push MCP image
        uses: docker/build-push-action@v5
        with:
          context: ./mcp
          file: ./mcp/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.MCP_IMAGE }}:${{ needs.prepare.outputs.tag_name }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.MCP_IMAGE }}:${{ needs.prepare.outputs.environment }}-latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-client:
    name: Build Client Image
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.client_changed == 'true'
    environment: ${{ needs.prepare.outputs.environment }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Client image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.API_URL }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.CLIENT_IMAGE }}:${{ needs.prepare.outputs.tag_name }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.CLIENT_IMAGE }}:${{ needs.prepare.outputs.environment }}-latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-admin-client:
    name: Build Admin Client Image
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.admin_changed == 'true'
    environment: ${{ needs.prepare.outputs.environment }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Admin Client image
        uses: docker/build-push-action@v5
        with:
          context: ./admin-client
          file: ./admin-client/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.API_URL }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.ADMIN_CLIENT_IMAGE }}:${{ needs.prepare.outputs.tag_name }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.ADMIN_CLIENT_IMAGE }}:${{ needs.prepare.outputs.environment }}-latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: [prepare, build-api, build-mcp, build-client, build-admin-client, build-reembed]
    if: ${{ !failure() && !cancelled() }}
    environment: ${{ needs.prepare.outputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Prepare docker-compose file
        shell: bash
        run: |
          if [[ "${{ needs.prepare.outputs.environment }}" == "dev" ]]; then
            if [[ -f "docker-compose.dev.yml" ]]; then
              cp docker-compose.dev.yml docker-compose.deploy.yml
            elif [[ -f "docker-compose.dev.yaml" ]]; then
              cp docker-compose.dev.yaml docker-compose.deploy.yml
            else
              echo "Missing docker-compose.dev.yml or docker-compose.dev.yaml file"
              exit 1
            fi

            # Replace placeholder images with the actual built image and tag for dev
            ENV_TAG="${{ needs.prepare.outputs.environment }}-latest"
            sed -i "s|image: .*shelfscan-api.*|image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.API_IMAGE }}:${ENV_TAG}|g" docker-compose.deploy.yml
            sed -i "s|image: .*shelfscan-client.*|image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.CLIENT_IMAGE }}:${ENV_TAG}|g" docker-compose.deploy.yml
            sed -i "s|image: .*shelfscan-admin-client.*|image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.ADMIN_CLIENT_IMAGE }}:${ENV_TAG}|g" docker-compose.deploy.yml
            sed -i "s|image: .*shelfscan-mcp.*|image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.MCP_IMAGE }}:${ENV_TAG}|g" docker-compose.deploy.yml
          else
            if [[ -f "docker-compose.yml" ]]; then
              cp docker-compose.yml docker-compose.deploy.yml
            elif [[ -f "docker-compose.yaml" ]]; then
              cp docker-compose.yaml docker-compose.deploy.yml
            else
              echo "Missing docker-compose.yml or docker-compose.yaml file"
              exit 1
            fi

            # Replace local build tags with remote registry images for production
            ENV_TAG="${{ needs.prepare.outputs.environment }}-latest"
            sed -i "s|build: ./server|image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.API_IMAGE }}:${ENV_TAG}|g" docker-compose.deploy.yml
            sed -i "s|build: ./client|image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.CLIENT_IMAGE }}:${ENV_TAG}|g" docker-compose.deploy.yml
            sed -i "s|build: ./admin-client|image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.ADMIN_CLIENT_IMAGE }}:${ENV_TAG}|g" docker-compose.deploy.yml
            sed -i "s|build: ./mcp|image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.MCP_IMAGE }}:${ENV_TAG}|g" docker-compose.deploy.yml
          fi

      - name: Setup SSH with password
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Copy docker-compose to server
        env:
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        shell: bash
        run: |
          sshpass -p "$SSH_PASSWORD" ssh -o StrictHostKeyChecking=no "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" "mkdir -p /shelfscan"
          sshpass -p "$SSH_PASSWORD" scp -o StrictHostKeyChecking=no docker-compose.deploy.yml "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/shelfscan/docker-compose.yml"

      - name: Generate .env file on server
        env:
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        shell: bash
        run: |
          # Resolve ports with defaults if secrets are not set
          HTTP_PORT="${{ secrets.HTTP_PORT }}"
          ADMIN_PORT="${{ secrets.ADMIN_PORT }}"
          HTTPS_PORT="${{ secrets.HTTPS_PORT }}"
          API_PORT="${{ secrets.API_PORT }}"
          MCP_PORT="${{ secrets.MCP_PORT }}"
          QDRANT_PORT="${{ secrets.QDRANT_PORT }}"
          QDRANT_PORT_GRPC="${{ secrets.QDRANT_PORT_GRPC }}"
          CLIENT_PORT="${{ secrets.CLIENT_PORT }}"
          ADMIN_CLIENT_PORT="${{ secrets.ADMIN_CLIENT_PORT }}"

          HTTP_PORT=${HTTP_PORT:-8090}
          ADMIN_PORT=${ADMIN_PORT:-8182}
          HTTPS_PORT=${HTTPS_PORT:-8444}
          API_PORT=${API_PORT:-8085}
          MCP_PORT=${MCP_PORT:-8087}
          QDRANT_PORT=${QDRANT_PORT:-6335}
          QDRANT_PORT_GRPC=${QDRANT_PORT_GRPC:-6336}
          CLIENT_PORT=${CLIENT_PORT:-5175}
          ADMIN_CLIENT_PORT=${ADMIN_CLIENT_PORT:-5176}

          sshpass -p "$SSH_PASSWORD" ssh -o StrictHostKeyChecking=no "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" << EOF
          cat << EOT > /shelfscan/.env
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL=models/gemma-4-31b-a4b-it
          GEMINI_TEMPERATURE=0.3
          GEMINI_MAX_OUTPUT_TOKENS=8192
          GEMINI_PROMPT="Analizza questa esposizione di gioielli. Identifica ed elenca solo gli articoli di gioielleria reali e chiaramente visibili (come anelli, collane, bracciali, orecchini o orologi) attualmente presenti. NON rilevare slot vuoti, vassoi vuoti, scatole vuote, espositori vuoti, cartellini dei prezzi, etichette, riflessi o elementi di sfondo. Se non sono visibili gioielli o l'esposizione è vuota, restituisci un array vuoto []. Restituisci SOLO un array JSON valido di oggetti. Ciascun oggetto deve avere: 'desc': una breve descrizione in italiano contenente colore/materiale. 'box': un array [ymin, xmin, ymax, xmax] (normalizzato da 0 a 1000)."
          QDRANT_HOST=http://qdrant
          QDRANT_PORT=6333
          MCP_URL=ws://mcp:8081/ws
          HTTP_PORT=$HTTP_PORT
          ADMIN_PORT=$ADMIN_PORT
          HTTPS_PORT=$HTTPS_PORT
          API_PORT=$API_PORT
          MCP_PORT=$MCP_PORT
          QDRANT_PORT=$QDRANT_PORT
          QDRANT_PORT_GRPC=$QDRANT_PORT_GRPC
          CLIENT_PORT=$CLIENT_PORT
          ADMIN_CLIENT_PORT=$ADMIN_CLIENT_PORT
          EOT
          EOF

      - name: Deploy on server
        env:
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        shell: bash
        run: |
          sshpass -p "$SSH_PASSWORD" ssh -o StrictHostKeyChecking=no "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" << 'EOF'
          set -e

          cd /shelfscan

          echo "${{ secrets.GH_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

          docker compose pull
          
          # Force stop anything on the target ports to avoid bind errors
          docker compose down --remove-orphans || true
          
          docker compose up -d

          sleep 5
          if curl -f http://localhost:8080/health > /dev/null 2>&1; then
            echo "API health check passed"
          else
            echo "API health check failed - please verify manually"
          fi
          EOF

      - name: Run reembed-inventory (tag *.reembed* only)
        if: needs.prepare.outputs.run_reembed == 'true'
        env:
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          REEMBED_TAG: ${{ needs.prepare.outputs.tag_name }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        shell: bash
        run: |
          sshpass -p "$SSH_PASSWORD" ssh -o StrictHostKeyChecking=no "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" << EOF
          set -e
          cd /shelfscan
          NET=\$(docker network ls --format '{{.Name}}' | grep -E 'shelfscan|smartjewelry' | head -n1)
          echo "Using docker network: \$NET"
          docker pull ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.REEMBED_IMAGE }}:${REEMBED_TAG}
          docker run --rm --network "\$NET" \
            -v /shelfscan/server/uploads:/app/uploads:ro \
            -e GEMINI_API_KEY='${GEMINI_API_KEY}' \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.REEMBED_IMAGE }}:${REEMBED_TAG} \
            --qdrant-host qdrant --qdrant-port 6334 \
            --uploads-dir /app/uploads
          EOF

      - name: Cleanup Docker dangling images
        env:
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        shell: bash
        run: |
          sshpass -p "$SSH_PASSWORD" ssh -o StrictHostKeyChecking=no "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" << 'EOF'
          docker image prune -f
          EOF

      - name: Notify deployment
        if: success()
        run: |
          echo "Successfully deployed tag: ${{ needs.prepare.outputs.tag_name }} to ${{ needs.prepare.outputs.environment }} server"
