version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    labels:
      - "docker-volume-backup.stop-during-backup=true"

  api:
    build: ./server
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - QDRANT_HOST=http://qdrant
      - QDRANT_PORT=6333
      - MCP_URL=ws://mcp:8081/ws
    volumes:
      - ./server/uploads:/app/uploads
      - ./server/db:/app/db
      - ./logs:/app/logs
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      - qdrant
    labels:
      - "docker-volume-backup.stop-during-backup=true"

  mcp:
    build: ./mcp
    ports:
      - "8081:8081"
    environment:
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - qdrant

  client:
    build: ./client
    ports:
      - "5173:80"

  admin-client:
    build: ./admin-client
    ports:
      - "5174:80"

  backup:
    image: offen/docker-volume-backup:v2
    restart: unless-stopped
    environment:
      - BACKUP_CRON_EXPRESSION=0 3 * * *
      - BACKUP_RETENTION_DAYS=14
      - BACKUP_FILENAME=shelfscan-backup-%Y-%m-%dT%H-%M-%S.tar.gz
      - BACKUP_PRUNING_PREFIX=shelfscan-backup-
    volumes:
      - ./server/db:/backup/db:ro
      - ./server/uploads:/backup/uploads:ro
      - qdrant_storage:/backup/qdrant:ro
      - ./backups:/archive
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  qdrant_storage:
