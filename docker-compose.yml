version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  api:
    build: ./server
    ports:
      - "8080:8080"
    environment:
      - QDRANT_HOST=http://qdrant
      - QDRANT_PORT=6333
      - EMBEDDINGS_HOST=http://embeddings
      - EMBEDDINGS_PORT=8001
      - MCP_URL=ws://mcp:8081/ws
      - GEMINI_API_KEY=AIzaSyB7cu8UTzqP-DQUKrB10cdbmVstgnGp5_U
      - GEMINI_MODEL=models/gemini-2.5-flash
      - GEMINI_TEMPERATURE=0.3
      - GEMINI_MAX_OUTPUT_TOKENS=8192
      - "GEMINI_PROMPT=Analyze this jewelry display. Identify and list only actual, clearly visible jewelry items (such as rings, necklaces, bracelets, earrings, or watches) that are currently present. Do NOT detect empty slots, empty trays, empty boxes, blank stands, price tags, labels, reflections, or background elements. If no jewelry is visible or the display is empty, return an empty array []. Return ONLY a valid JSON array of objects. Each object must have: 'desc': a short description including color/material. 'box': an array [ymin, xmin, ymax, xmax] (normalized 0 to 1000)."
    volumes:
      - ./server/uploads:/app/uploads
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      - qdrant

  mcp:
    build: ./mcp
    ports:
      - "8081:8081"
    environment:
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - qdrant

  client:
    build: ./client
    ports:
      - "5173:80"

  admin-client:
    build: ./admin-client
    ports:
      - "5174:80"

volumes:
  qdrant_storage:
