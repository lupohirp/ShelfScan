version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  embeddings:
    build: ./embeddings
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./server
    ports:
      - "8080:8080"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - EMBEDDINGS_URL=http://embeddings:8001
    depends_on:
      qdrant:
        condition: service_healthy
      embeddings:
        condition: service_healthy

  mcp:
    build: ./mcp
    ports:
      - "8081:8081"
    environment:
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      qdrant:
        condition: service_healthy

  client:
    build: ./client
    ports:
      - "5173:5173"
    environment:
      - VITE_GEMINI_API_KEY=${VITE_GEMINI_API_KEY}

  admin-client:
    build: ./admin-client
    ports:
      - "5174:5173"

volumes:
  qdrant_storage:
