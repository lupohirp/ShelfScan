version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  api:
    build: ./server
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - QDRANT_HOST=http://qdrant
      - QDRANT_PORT=6333
      - EMBEDDINGS_HOST=http://embeddings
      - EMBEDDINGS_PORT=8001
      - MCP_URL=ws://mcp:8081/ws
    volumes:
      - ./server/uploads:/app/uploads
      - ./logs:/app/logs
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      - qdrant

  mcp:
    build: ./mcp
    ports:
      - "8081:8081"
    environment:
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - qdrant

  client:
    build: ./client
    ports:
      - "5173:80"

  admin-client:
    build: ./admin-client
    ports:
      - "5174:80"

volumes:
  qdrant_storage:
