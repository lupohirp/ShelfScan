version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  embeddings:
    build: ./embeddings
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
      - QDRANT_URL=http://qdrant:6333
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8001/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - qdrant

  api:
    build: ./server
    ports:
      - "8080:8080"
    environment:
      - QDRANT_HOST=http://qdrant
      - QDRANT_PORT=6333
      - EMBEDDINGS_HOST=http://embeddings
      - EMBEDDINGS_PORT=8001
      - MCP_URL=ws://mcp:8081/ws
      - GEMINI_API_KEY=AIzaSyB7cu8UTzqP-DQUKrB10cdbmVstgnGp5_U
      - GEMINI_MODEL=models/gemini-2.5-flash
      - GEMINI_TEMPERATURE=0.3
      - GEMINI_MAX_OUTPUT_TOKENS=8192
      - "GEMINI_PROMPT=Analyze this jewelry display. List each distinct jewelry item.Return ONLY a valid JSON array of objects. Each object must have:'desc': a short description including color/material. 'box': an array [ymin, xmin, ymax, xmax] (normalized 0 to 1000)."
    volumes:
      - ./server/uploads:/app/uploads
    depends_on:
      - qdrant
      - embeddings

  mcp:
    build: ./mcp
    ports:
      - "8081:8081"
    environment:
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - qdrant

  client:
    build: ./client
    ports:
      - "5173:80"

  admin-client:
    build: ./admin-client
    ports:
      - "5174:80"

volumes:
  qdrant_storage:
