version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: shelfscan-qdrant
    restart: unless-stopped
    networks:
      - shelfscan-network
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_PORT_GRPC:-6334}:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  api:
    image: ghcr.io/${GHCR_OWNER:-lupohirp}/${API_IMAGE:-shelfscan-api}:dev-latest
    container_name: shelfscan-api
    restart: unless-stopped
    networks:
      - shelfscan-network
    depends_on:
      - qdrant
    env_file:
      - .env
    environment:
      - ENVIRONMENT=development
      - QDRANT_HOST=http://qdrant
      - QDRANT_PORT=6333
      - MCP_URL=ws://mcp:8081/ws
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - ./server/uploads:/app/uploads
      - ./server/db:/app/db
      - ./logs:/app/logs

  mcp:
    image: ghcr.io/${GHCR_OWNER:-lupohirp}/${MCP_IMAGE:-shelfscan-mcp}:dev-latest
    container_name: shelfscan-mcp
    restart: unless-stopped
    networks:
      - shelfscan-network
    depends_on:
      - qdrant
    environment:
      - QDRANT_URL=http://qdrant:6333
    ports:
      - "${MCP_PORT:-8081}:8081"

  client:
    image: ghcr.io/${GHCR_OWNER:-lupohirp}/${CLIENT_IMAGE:-shelfscan-client}:dev-latest
    container_name: shelfscan-client
    restart: unless-stopped
    networks:
      - shelfscan-network
    ports:
      - "${CLIENT_PORT:-5173}:80"
    depends_on:
      - api

  admin-client:
    image: ghcr.io/${GHCR_OWNER:-lupohirp}/${ADMIN_CLIENT_IMAGE:-shelfscan-admin-client}:dev-latest
    container_name: shelfscan-admin-client
    restart: unless-stopped
    networks:
      - shelfscan-network
    ports:
      - "${ADMIN_CLIENT_PORT:-5174}:80"
    depends_on:
      - api

volumes:
  qdrant_storage:

networks:
  shelfscan-network:
    name: app_smartjewelry-network
    external: true
